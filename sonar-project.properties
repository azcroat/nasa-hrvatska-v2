sonar.projectKey=AzCroat_nasa-hrvatska-v2
sonar.organization=azcroat
sonar.projectName=Naša Hrvatska v2

# Source + test paths
sonar.sources=src
sonar.tests=src/tests
sonar.test.inclusions=src/tests/**
sonar.exclusions=dist/**,node_modules/**,public/**,scripts/**,coverage/**

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Suppress intentional empty catch blocks (optional browser APIs: haptic, audio, notifications, URL manipulation)
# These are safe fallbacks, not ignored errors
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2221
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.{js,jsx}
