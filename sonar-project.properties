sonar.projectKey=AzCroat_nasa-hrvatska-v2
sonar.organization=azcroat
sonar.projectName=Naša Hrvatska v2

# Source + test paths
sonar.sources=src
sonar.tests=src/tests
sonar.test.inclusions=src/tests/**
sonar.exclusions=dist/**,node_modules/**,public/**,scripts/**,coverage/**

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: application bootstrap entry point. main.tsx wires up
# React render, Sentry init, the service worker and the global window error
# handlers — side-effecting code that runs on import and is not unit-testable by
# design. Its testable logic is extracted into covered helpers (e.g.
# sentryHelpers.ts). Excluding the entry shell from coverage is standard; it is
# NOT excluded from issue analysis, so smells/bugs there are still reported.
sonar.coverage.exclusions=src/main.tsx

sonar.sourceEncoding=UTF-8

# Suppress intentional empty catch blocks (optional browser APIs: haptic, audio, notifications, URL manipulation)
# These are safe fallbacks, not ignored errors
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2221
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2221
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.jsx
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.jsx
