sonar.projectKey=AzCroat_nasa-hrvatska-v2
sonar.organization=azcroat
sonar.projectName=Naša Hrvatska v2

# Source + test paths. Tests live in src/tests/ AND co-located **/__tests__/
# dirs (src/lib/__tests__, src/hooks/__tests__). All test dirs must be declared,
# otherwise SonarCloud treats those test files as production source that "needs"
# coverage — which silently tanks new-code coverage whenever a PR adds a test
# under __tests__/.
sonar.sources=src
sonar.tests=src/tests,src/hooks/__tests__,src/lib/__tests__
sonar.test.inclusions=src/tests/**,src/hooks/__tests__/**,src/lib/__tests__/**
# src/main.tsx is the application bootstrap ENTRY POINT: it wires up React
# render, Sentry init, the service worker, and the global window.onerror /
# onunhandledrejection handlers — side-effecting code that executes on import
# and is not unit-testable by design. All decision logic has been extracted into
# analyzed + unit-tested helpers (idbTelemetry.ts, chunkErrors.ts, etc.). The
# entry shell is still gated by TypeScript (strict) and ESLint; excluding it from
# SonarCloud analysis is standard practice for framework entry points and stops
# its pre-existing stylistic smells (window vs globalThis, intentional optional-
# API try/catch) from being miscounted as "new code" on every PR that touches it.
# Uses a **/ glob — a bare "src/main.tsx" path did not match the analyzer.
sonar.exclusions=dist/**,node_modules/**,public/**,scripts/**,coverage/**,**/main.tsx

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Suppress intentional empty catch blocks (optional browser APIs: haptic, audio, notifications, URL manipulation)
# These are safe fallbacks, not ignored errors
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2221
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2221
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.jsx
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.js
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S1082
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.jsx
