<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy to teal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060e1e"/>
      <stop offset="50%" stop-color="#0a2348"/>
      <stop offset="100%" stop-color="#0e4f6e"/>
    </linearGradient>
    <!-- Gold gradient for shield border and trim -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE070"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#C8980A"/>
    </linearGradient>
    <!-- Shield inner glow -->
    <radialGradient id="shieldGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Subtle inner shadow on background -->
    <radialGradient id="innerShadow" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <!-- Clip path for checkerboard inside shield -->
    <clipPath id="shieldClip">
      <path d="M 256 118 L 346 140 L 346 260 Q 346 320 256 370 Q 166 320 166 260 L 166 140 Z"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#innerShadow)"/>

  <!-- Decorative gold ring/halo behind shield -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.35"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>

  <!-- Shield gold border (slightly larger, rendered first) -->
  <path d="M 256 108 L 356 132 L 356 264 Q 356 334 256 388 Q 156 334 156 264 L 156 132 Z"
    fill="url(#gold)" opacity="0.9"/>

  <!-- Shield white/red checkerboard (5x5 grid, clipped to shield shape) -->
  <!-- Row 1: W R W R W -->
  <g clip-path="url(#shieldClip)">
    <!-- Row 1 -->
    <rect x="166" y="118" width="36" height="36" fill="#FFFFFF"/>
    <rect x="202" y="118" width="36" height="36" fill="#D40030"/>
    <rect x="238" y="118" width="36" height="36" fill="#FFFFFF"/>
    <rect x="274" y="118" width="36" height="36" fill="#D40030"/>
    <rect x="310" y="118" width="36" height="36" fill="#FFFFFF"/>
    <!-- Row 2 -->
    <rect x="166" y="154" width="36" height="36" fill="#D40030"/>
    <rect x="202" y="154" width="36" height="36" fill="#FFFFFF"/>
    <rect x="238" y="154" width="36" height="36" fill="#D40030"/>
    <rect x="274" y="154" width="36" height="36" fill="#FFFFFF"/>
    <rect x="310" y="154" width="36" height="36" fill="#D40030"/>
    <!-- Row 3 -->
    <rect x="166" y="190" width="36" height="36" fill="#FFFFFF"/>
    <rect x="202" y="190" width="36" height="36" fill="#D40030"/>
    <rect x="238" y="190" width="36" height="36" fill="#FFFFFF"/>
    <rect x="274" y="190" width="36" height="36" fill="#D40030"/>
    <rect x="310" y="190" width="36" height="36" fill="#FFFFFF"/>
    <!-- Row 4 -->
    <rect x="166" y="226" width="36" height="36" fill="#D40030"/>
    <rect x="202" y="226" width="36" height="36" fill="#FFFFFF"/>
    <rect x="238" y="226" width="36" height="36" fill="#D40030"/>
    <rect x="274" y="226" width="36" height="36" fill="#FFFFFF"/>
    <rect x="310" y="226" width="36" height="36" fill="#D40030"/>
    <!-- Row 5 -->
    <rect x="166" y="262" width="36" height="36" fill="#FFFFFF"/>
    <rect x="202" y="262" width="36" height="36" fill="#D40030"/>
    <rect x="238" y="262" width="36" height="36" fill="#FFFFFF"/>
    <rect x="274" y="262" width="36" height="36" fill="#D40030"/>
    <rect x="310" y="262" width="36" height="36" fill="#FFFFFF"/>
    <!-- Rows 6-8 filling the lower shield -->
    <rect x="166" y="298" width="36" height="80" fill="#D40030"/>
    <rect x="202" y="298" width="36" height="80" fill="#FFFFFF"/>
    <rect x="238" y="298" width="36" height="80" fill="#D40030"/>
    <rect x="274" y="298" width="36" height="80" fill="#FFFFFF"/>
    <rect x="310" y="298" width="36" height="80" fill="#D40030"/>
    <!-- Inner glow overlay -->
    <path d="M 256 118 L 346 140 L 346 260 Q 346 320 256 370 Q 166 320 166 260 L 166 140 Z"
      fill="url(#shieldGlow)"/>
  </g>

  <!-- Small gold crown above shield -->
  <g transform="translate(256, 98)" fill="url(#gold)">
    <!-- Crown base -->
    <rect x="-28" y="0" width="56" height="12" rx="3"/>
    <!-- Crown points: 3 peaks -->
    <polygon points="-28,0 -22,-18 -14,-8 0,-22 14,-8 22,-18 28,0" fill="url(#gold)"/>
    <!-- Crown gems: 3 small circles -->
    <circle cx="-22" cy="-16" r="4" fill="#D40030" opacity="0.9"/>
    <circle cx="0"   cy="-20" r="4.5" fill="#D40030" opacity="0.9"/>
    <circle cx="22"  cy="-16" r="4" fill="#D40030" opacity="0.9"/>
  </g>

  <!-- "NH" monogram below shield — Naša Hrvatska initials -->
  <text x="256" y="432"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="700"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="6">NH</text>

  <!-- Thin gold line separator above text -->
  <line x1="186" y1="408" x2="326" y2="408" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
</svg>
