<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2f7"/>
      <stop offset="100%" stop-color="#e2eaf3"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#eef2f7"/>
  <text x="20" y="28" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1c1917">9:41</text>
  <text x="350" y="28" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="12" fill="#1c1917">●●●</text>

  <!-- Hero streak card -->
  <rect x="16" y="56" width="358" height="120" rx="20" fill="url(#header)"/>
  <text x="32" y="92" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="white">🔥 12-day streak</text>
  <text x="32" y="116" font-family="'Outfit', sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.8)">Keep going — you're building a real habit!</text>
  <rect x="32" y="132" width="280" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="32" y="132" width="180" height="8" rx="4" fill="rgba(255,255,255,0.85)"/>
  <text x="32" y="160" font-family="'Outfit', sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">1,240 XP total · Level 5</text>

  <!-- Section header -->
  <text x="20" y="206" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" fill="#64748b" letter-spacing="1">⚡ TODAY</text>

  <!-- Daily challenge card -->
  <rect x="16" y="218" width="358" height="80" rx="16" fill="white"/>
  <rect x="16" y="218" width="4" height="80" rx="2" fill="#0e7490"/>
  <text x="36" y="248" font-family="'Outfit', sans-serif" font-size="15" font-weight="700" fill="#1c1917">Daily Challenge</text>
  <text x="36" y="270" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b">3 questions · 2 completed</text>
  <rect x="280" y="236" width="70" height="32" rx="10" fill="#0e7490"/>
  <text x="315" y="257" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Continue</text>

  <!-- Lesson card -->
  <rect x="16" y="312" width="358" height="80" rx="16" fill="white"/>
  <rect x="16" y="312" width="4" height="80" rx="2" fill="#7c3aed"/>
  <text x="36" y="342" font-family="'Outfit', sans-serif" font-size="15" font-weight="700" fill="#1c1917">👨‍👩‍👧‍👦 Family Vocabulary</text>
  <text x="36" y="364" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b">15 words · Learn phase · +35 XP</text>
  <rect x="280" y="330" width="70" height="32" rx="10" fill="#7c3aed"/>
  <text x="315" y="351" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Start</text>

  <!-- SRS reminder card -->
  <rect x="16" y="406" width="358" height="72" rx="16" fill="#fef3c7"/>
  <rect x="16" y="406" width="4" height="72" rx="2" fill="#f59e0b"/>
  <text x="36" y="432" font-family="'Outfit', sans-serif" font-size="14" font-weight="700" fill="#92400e">📖 5 words due for review</text>
  <text x="36" y="454" font-family="'Outfit', sans-serif" font-size="12" fill="#78716c">Review them before they fade from memory</text>

  <!-- Word of the day -->
  <rect x="16" y="494" width="358" height="90" rx="16" fill="white"/>
  <text x="36" y="520" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" fill="#64748b" letter-spacing="1">WORD OF THE DAY</text>
  <text x="36" y="548" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#0e7490">kuća</text>
  <text x="160" y="548" font-family="'Outfit', sans-serif" font-size="18" fill="#1c1917">— house</text>
  <text x="36" y="572" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b" font-style="italic">Moja kuća je lijepa. · My house is beautiful.</text>

  <!-- Phrase of the day -->
  <rect x="16" y="600" width="358" height="72" rx="16" fill="linear-gradient(135deg, #f0f9ff, #e0f2fe)"/>
  <rect x="16" y="600" width="358" height="72" rx="16" fill="#f0f9ff" opacity="0.7"/>
  <text x="36" y="626" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" fill="#64748b" letter-spacing="1">PHRASE OF THE DAY</text>
  <text x="36" y="650" font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="600" fill="#0e7490">Jedna kava, molim.</text>
  <text x="36" y="668" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b">One coffee, please. 🇭🇷</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="764" width="390" height="80" fill="rgba(255,255,255,0.95)"/>
  <line x1="0" y1="764" x2="390" y2="764" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- Tab items -->
  <text x="39" y="800" font-family="'Outfit', sans-serif" font-size="10" font-weight="800" fill="#0e7490" text-anchor="middle">🏠</text>
  <text x="39" y="818" font-family="'Outfit', sans-serif" font-size="10" font-weight="800" fill="#0e7490" text-anchor="middle">Home</text>

  <text x="117" y="800" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">📚</text>
  <text x="117" y="818" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Learn</text>

  <text x="195" y="800" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">⚡</text>
  <text x="195" y="818" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Practice</text>

  <text x="273" y="800" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">🇭🇷</text>
  <text x="273" y="818" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Culture</text>

  <text x="351" y="800" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">👤</text>
  <text x="351" y="818" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Me</text>

  <!-- Active tab indicator -->
  <rect x="14" y="764" width="50" height="3" rx="1.5" fill="#0e7490"/>
</svg>
