<svg viewBox="0 0 392 158" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cfeaf0"/><stop offset="1" stop-color="#bfe0e6"/></linearGradient>
    <linearGradient id="cobble" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bdb3a1"/><stop offset="1" stop-color="#a49987"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="392" height="120" fill="url(#sky)"/>
  <rect x="0" y="120" width="392" height="38" fill="url(#cobble)"/>

  <!-- back row of Adriatic townhouses enclosing the square -->
  <rect x="0" y="62" width="74" height="54" fill="#e6d2a8"/><polygon points="0,62 74,62 74,50 6,50" fill="#b5642f"/>
  <rect x="74" y="58" width="62" height="58" fill="#d8b48a"/><polygon points="74,58 136,58 136,46 80,46" fill="#9a4f2a"/>
  <rect x="300" y="60" width="60" height="56" fill="#e0c79a"/><polygon points="300,60 360,60 360,48 306,48" fill="#b5642f"/>
  <rect x="356" y="64" width="36" height="52" fill="#d8b48a"/><polygon points="356,64 392,64 392,52 360,52" fill="#9a4f2a"/>
  <g fill="#9bb7c4">
    <rect x="14" y="72" width="12" height="16"/><rect x="40" y="72" width="12" height="16"/>
    <rect x="90" y="68" width="12" height="16"/><rect x="112" y="68" width="12" height="16"/>
    <rect x="312" y="70" width="12" height="16"/><rect x="336" y="70" width="12" height="16"/>
    <rect x="366" y="74" width="11" height="15"/>
  </g>

  <!-- baroque bell tower (centre, hero) -->
  <path d="M166 46 q30 -24 60 0 z" fill="#5d7f88"/>
  <path d="M180 46 q16 -13 32 0 z" fill="#6b8f99"/>
  <rect x="194" y="14" width="4" height="12" fill="#C8980A"/>
  <circle cx="196" cy="11" r="3" fill="#C8980A"/>
  <rect x="170" y="46" width="52" height="74" fill="#e7ddc6"/>
  <rect x="170" y="46" width="52" height="74" fill="none" stroke="#c3b596" stroke-width="2"/>
  <g fill="#d4c6a4"><rect x="170" y="52" width="7" height="9"/><rect x="170" y="74" width="7" height="9"/><rect x="170" y="96" width="7" height="9"/><rect x="215" y="52" width="7" height="9"/><rect x="215" y="74" width="7" height="9"/><rect x="215" y="96" width="7" height="9"/></g>
  <circle cx="196" cy="64" r="11" fill="#ffffff"/>
  <circle cx="196" cy="64" r="11" fill="none" stroke="#6b4e2e" stroke-width="2"/>
  <line x1="196" y1="64" x2="196" y2="57" stroke="#1f2d33" stroke-width="2"/>
  <line x1="196" y1="64" x2="202" y2="64" stroke="#1f2d33" stroke-width="2"/>
  <path d="M184 102 v-14 a12 12 0 0 1 24 0 v14 z" fill="#3a4a52"/>

  <!-- šahovnica bunting (building -> tower -> building) -->
  <path d="M30 50 Q104 66 168 50" stroke="#7a5a36" stroke-width="1.3" fill="none"/>
  <path d="M224 50 Q300 66 360 52" stroke="#7a5a36" stroke-width="1.3" fill="none"/>
  <polygon points="44,55 64,58 54,71" fill="#D40030"/><polygon points="70,58 90,60 80,73" fill="#ffffff"/><polygon points="96,60 116,60 106,73" fill="#D40030"/><polygon points="122,59 142,56 132,70" fill="#ffffff"/>
  <polygon points="240,56 260,53 250,68" fill="#ffffff"/><polygon points="266,54 286,57 276,70" fill="#D40030"/><polygon points="292,57 312,59 302,72" fill="#ffffff"/><polygon points="318,58 338,56 328,71" fill="#D40030"/>

  <!-- festival stall (left, fills the bottom-left; no host portrait) -->
  <polygon points="6,98 92,98 49,80" fill="#0e7490"/>
  <rect x="10" y="98" width="78" height="22" fill="#ffffff"/>
  <g fill="#D40030"><rect x="10" y="98" width="13" height="22"/><rect x="36" y="98" width="13" height="22"/><rect x="62" y="98" width="13" height="22"/></g>
  <rect x="16" y="112" width="66" height="8" fill="#8a6d3f"/>

  <!-- tiered fountain (centre-bottom) -->
  <ellipse cx="196" cy="144" rx="52" ry="12" fill="#9ec6cf"/>
  <ellipse cx="196" cy="142" rx="52" ry="12" fill="none" stroke="#cfcabb" stroke-width="3"/>
  <rect x="190" y="124" width="12" height="18" fill="#cfcabb"/>
  <ellipse cx="196" cy="126" rx="18" ry="5" fill="#b8d6dd"/>
  <ellipse cx="196" cy="126" rx="18" ry="5" fill="none" stroke="#cfcabb" stroke-width="2"/>
  <path d="M196 124 q-5 -9 0 -15 q5 6 0 15" fill="#cfeef2"/>

  <!-- festival tent (right) -->
  <polygon points="300,104 380,104 340,88" fill="#c2410c"/>
  <rect x="304" y="104" width="72" height="16" fill="#ffffff"/>
  <g fill="#5d8c62"><rect x="304" y="104" width="12" height="16"/><rect x="328" y="104" width="12" height="16"/><rect x="352" y="104" width="12" height="16"/></g>
