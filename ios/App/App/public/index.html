  <!-- Apply capacitor-native class synchronously before React mounts so CSS overrides
       take effect from the very first paint.
       Detection uses window.location.hostname === 'localhost' — set by the OS
       before any JS runs (Capacitor androidScheme:'https' → origin https://localhost).
       This is 100% race-condition-free; window.Capacitor bridge injection is async
       and unreliable at this point. -->
  <script>
    try {
      // Capacitor Android: https://localhost (no port).
      // Dev/CI server: http://localhost:4173 (has a port).
      if (window.location.hostname === 'localhost' && !window.location.port) {
        document.documentElement.classList.add('capacitor-native');
      }
    } catch (e) {}
  </script>

  <!-- Skip to main content for keyboard/screen reader users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="root"></div>

  <!-- SW update interceptor: runs before React mounts.
       If a new SW is already waiting, activate it and reload before
       the app renders stale cached content. Zero user action required. -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistration().then(function (reg) {
        if (!reg) return;
        function activate(sw) {
          sw.postMessage({ type: 'SKIP_WAITING' });
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            window.location.reload();
          }, { once: true });
        }
        // Case 1: new SW already waiting before this page rendered
        if (reg.waiting) { activate(reg.waiting); return; }
        // Case 2: new SW installs while page is loading
        reg.addEventListener('updatefound', function () {
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function () {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              activate(sw);
            }
          });
        });
      });
    })();
  </script>
