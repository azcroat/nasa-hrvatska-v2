name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents E2E suites from piling up during rapid development (e.g. 6 queued runs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: TypeScript + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Content endpoint tests import ETAGS from _etags.js (auto-generated, gitignored).
      # Generator runs as prebuild during npm run build, but this job doesn't build —
      # invoke directly so the file exists before vitest imports the endpoints.
      - name: Generate content ETags (required by endpoint tests)
        run: node scripts/generate-content-etags.mjs
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test -- --run

  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # --ignore-scripts: pure-JS toolchain below (eslint/tsc/prettier/madge/npm audit)
      # doesn't need native binaries from esbuild/sharp/better-sqlite3 postinstalls.
      # Reduces supply-chain blast radius if a transitive dep is compromised.
      - name: Install dependencies (no install scripts)
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Dependency security audit
        run: npm audit --audit-level=high --omit=dev

      - name: TypeScript check
        run: npm run typecheck

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}" "functions/**/*.js"

      - name: Circular dependency check
        run: npm run check:circular

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate content ETags (required by endpoint tests)
        run: node scripts/generate-content-etags.mjs

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonar:
    name: SonarCloud Audit
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true  # Non-blocking — SONAR_TOKEN may not be configured
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for accurate blame/new-issue detection

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Disable Automatic Analysis (enable CI-based scan with coverage)
        run: |
          curl -s -X POST "https://sonarcloud.io/api/autoscan/activation" \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            -d "enable=false&projectKey=AzCroat_nasa-hrvatska-v2" || true

      - name: Set up custom Quality Gate (Reliability A + Security Review A, no coverage req)
        run: |
          TOKEN="${{ secrets.SONAR_TOKEN }}"
          ORG="azcroat"
          PROJECT="AzCroat_nasa-hrvatska-v2"
          QG_NAME="Nasa Hrvatska"
          QG_ID=$(curl -s -u "$TOKEN:" "https://sonarcloud.io/api/qualitygates/list?organization=$ORG" | python3 -c "import sys,json;d=json.load(sys.stdin);r=[q['id'] for q in d.get('qualitygates',[]) if q['name']=='$QG_NAME'];print(r[0] if r else '')" 2>/dev/null)
          if [ -z "$QG_ID" ]; then
            QG_ID=$(curl -s -u "$TOKEN:" -X POST "https://sonarcloud.io/api/qualitygates/create" -d "name=Nasa+Hrvatska&organization=$ORG" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
            curl -s -u "$TOKEN:" -X POST "https://sonarcloud.io/api/qualitygates/create_condition" -d "gateId=$QG_ID&metric=reliability_rating&op=GT&error=1&organization=$ORG" > /dev/null
            curl -s -u "$TOKEN:" -X POST "https://sonarcloud.io/api/qualitygates/create_condition" -d "gateId=$QG_ID&metric=security_review_rating&op=GT&error=1&organization=$ORG" > /dev/null
            echo "Created Quality Gate: $QG_NAME (id=$QG_ID)"
          else
            echo "Quality Gate already exists: $QG_NAME (id=$QG_ID)"
          fi
          curl -s -u "$TOKEN:" -X POST "https://sonarcloud.io/api/qualitygates/select" -d "gateId=$QG_ID&projectKey=$PROJECT&organization=$ORG" > /dev/null
          echo "Assigned Quality Gate to project"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Fetch current bugs from SonarCloud
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/issues/search?componentKeys=AzCroat_nasa-hrvatska-v2&types=BUG&statuses=OPEN&ps=50" > /tmp/bugs.json
          echo "=== OPEN BUGS ===" && cat /tmp/bugs.json | node -e "const d=require('/dev/stdin');if(d.total===0){console.log('0 bugs!')}else{d.issues.forEach(i=>console.log(i.severity,i.rule,i.component.split('/').pop()+':'+i.line,'-',i.message.slice(0,80)))}" 2>/dev/null || cat /tmp/bugs.json | python3 -c "import sys,json;d=json.load(sys.stdin);[print(i['severity'],i['rule'],i['component'].split('/')[-1]+':'+str(i.get('line','?')),'-',i['message'][:80]) for i in d.get('issues',[])] or print('0 bugs')"

  e2e:
    name: E2E Tests (Cross-Browser)
    runs-on: ubuntu-latest
    needs: quality
    # 2026-05-22: bumped 45 → 75 — suite has grown substantially since the
    # 17-min historical baseline. Long-term fix is E2E sharding / test pruning.
    timeout-minutes: 75
    # Tests use seedAuth (localStorage injection) + blockFirebase (network abort) fixtures.
    # No live Firebase credentials needed — the app runs in fully hermetic mode.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers (Chrome, Firefox, WebKit)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Build for E2E (with placeholder Firebase config)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'placeholder' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'placeholder.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'placeholder' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'placeholder.appspot.com' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:placeholder' }}
          VITE_SENTRY_DSN: ""

      - name: Run E2E tests — Chrome (full suite)
        run: npx playwright test --project="Desktop Chrome"
        env:
          CI: true

      - name: Run E2E tests — Firefox + WebKit (smoke only)
        # Targeted subset to verify cross-browser compat without exceeding 45-min budget.
        # Full suite × 3 engines ≈ 60 min; smoke-only keeps Firefox+WebKit under 10 min.
        run: |
          npx playwright test \
            --project="Desktop Firefox" \
            --project="Desktop Safari (WebKit)" \
            e2e/navigation.spec.js \
            e2e/auth-edge-cases.spec.js \
            e2e/error-boundary.spec.js
        env:
          CI: true

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Bundle size check
        run: npm run size

      - name: Lighthouse CI
        run: npx lhci autorun
        continue-on-error: true  # NO_FCP is a transient headless-Chrome infra flake — never blocks deploy
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Provision Cloudflare resources (idempotent)
        if: github.event_name == 'push'
        run: node scripts/setup-cf-resources.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        # Pass --commit-message explicitly (subject line only, stripped of non-ASCII) to avoid
        # Cloudflare API error "Invalid commit message, it must be a valid UTF-8 string" [8000111]
        # triggered when wrangler reads the full commit body containing → / — characters.
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' | LC_ALL=C tr -cd '[:print:]' | cut -c1-200)
          npx --yes wrangler@3 pages deploy dist \
            --project-name=nasa-hrvatska-v2 \
            --branch=master \
            --commit-dirty=true \
            --commit-message="$COMMIT_MSG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
