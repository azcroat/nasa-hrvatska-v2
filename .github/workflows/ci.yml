name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nasa-hrvatska-v2 --branch=master

      - name: Re-add custom domain to force DNS recreation
        if: github.event_name == 'push'
        run: |
          echo "=== Removing domain ==="
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/nasa-hrvatska-v2/domains/nasahrvatska.com" \
            -H "Authorization: Bearer $API_TOKEN" | jq '.success, .errors'

          sleep 3

          echo "=== Re-adding domain ==="
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/nasa-hrvatska-v2/domains" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"nasahrvatska.com"}' | jq '.success, .errors, .result'

          sleep 10
          echo "=== DNS check ==="
          nslookup nasahrvatska.com 1.1.1.1
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
