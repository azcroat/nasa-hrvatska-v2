name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nasa-hrvatska-v2 --branch=master

      - name: Create DNS record for nasahrvatska.com
        if: github.event_name == 'push'
        run: |
          ZONE_ID="9f2ba0e8d16ebd53bd23d989fd03bd90"

          echo "=== Deleting existing root domain records ==="
          for ID in $(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=nasahrvatska.com&per_page=100" \
            -H "Authorization: Bearer $API_TOKEN" | jq -r '.result[].id // empty'); do
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$ID" \
              -H "Authorization: Bearer $API_TOKEN" | jq '.success'
          done

          echo "=== Creating CNAME record ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"nasahrvatska.com","content":"nasa-hrvatska-v2.pages.dev","ttl":1,"proxied":true}' | jq '.success, .errors, .result.name, .result.content'
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
