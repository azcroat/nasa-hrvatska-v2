name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Fix DNS and deploy to Cloudflare Pages
        if: github.event_name == 'push'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Get zone ID for nasahrvatska.com
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"

          # Delete any existing A or CNAME records for the root domain
          for RECORD_ID in $(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=nasahrvatska.com&per_page=100" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[] | select(.type=="A" or .type=="CNAME") | .id'); do
            echo "Deleting record: $RECORD_ID"
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN"
          done

          # Create correct CNAME record pointing to Cloudflare Pages
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"nasahrvatska.com","content":"nasa-hrvatska-v2.pages.dev","ttl":1,"proxied":true}')
          echo "DNS result: $RESULT"

          # Deploy to Cloudflare Pages
          npx wrangler pages deploy dist --project-name=nasa-hrvatska-v2 --branch=master
