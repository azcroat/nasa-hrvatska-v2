name: Cleanup CF Pages orphan env vars

on:
  workflow_dispatch:

# One-shot maintenance workflow: removes CF Pages env-var entries whose
# NAMES are corrupted (trailing whitespace, etc.) from clipboard-paste
# bugs in the CF dashboard form. Each orphan is listed explicitly here —
# we never delete by regex / batch, only the names enumerated below.
#
# Safe to re-run: wrangler's delete is a no-op when the name doesn't
# exist. Once the orphan is gone, this workflow stays in place but
# becomes a no-op too.

jobs:
  cleanup:
    name: Delete enumerated orphan env vars
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Override-then-delete plain_text orphans via wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # The CF Pages /accounts/.../pages/projects/{name} PATCH endpoint
          # returns 8000006 "Request body is incorrect" for env_vars updates
          # (broken since 2026-05-21). wrangler `pages secret delete` only
          # operates on secret_text entries, not plain_text — direct delete
          # of a plain_text orphan fails with "not present".
          #
          # Workaround:
          # 1. wrangler `pages secret put <name>` — creates a secret_text
          #    entry under the same name. Per CF Pages semantics, this
          #    *replaces* the plain_text entry of the same name (one entry
          #    per name regardless of type).
          # 2. wrangler `pages secret delete <name>` — removes the now-
          #    converted secret_text entry, leaving the env var gone.
          #
          # The trailing space in the orphan name is intentional and quoted
          # carefully through both calls.
          ORPHANS=(
            "AZURE_TTS_REGION "
          )
          for name in "${ORPHANS[@]}"; do
            echo "  → orphan [$name] (len=${#name})"

            echo "    [step 1/2] wrangler put — convert plain_text → secret_text"
            if printf 'placeholder-to-be-deleted' | \
                npx --yes wrangler@3 pages secret put "$name" \
                --project-name=nasa-hrvatska-v2 2>&1 | sed 's/^/      /'; then
              echo "    ✓ override succeeded"
            else
              echo "    ✗ wrangler put failed — orphan likely cannot be touched via wrangler; manual dashboard cleanup needed"
              continue
            fi

            echo "    [step 2/2] wrangler delete — remove the secret_text entry"
            if echo "y" | npx --yes wrangler@3 pages secret delete "$name" \
                --project-name=nasa-hrvatska-v2 2>&1 | sed 's/^/      /'; then
              echo "    ✓ orphan removed"
            else
              echo "    ✗ wrangler delete failed AFTER successful put — orphan now exists as secret_text with placeholder value; manual dashboard cleanup needed"
            fi
          done
          echo "===== Cleanup pass complete ====="
