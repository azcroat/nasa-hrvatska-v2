name: Cleanup CF Pages orphan env vars

on:
  workflow_dispatch:

# One-shot maintenance workflow: removes CF Pages env-var entries whose
# NAMES are corrupted (trailing whitespace, etc.) from clipboard-paste
# bugs in the CF dashboard form. Each orphan is listed explicitly here —
# we never delete by regex / batch, only the names enumerated below.
#
# Safe to re-run: wrangler's delete is a no-op when the name doesn't
# exist. Once the orphan is gone, this workflow stays in place but
# becomes a no-op too.

jobs:
  cleanup:
    name: Delete enumerated orphan env vars
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Delete orphans
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # NB: the trailing space in the name below is intentional — that's
          # the actual orphan key on CF Pages. Quoted carefully so wrangler
          # receives the exact byte sequence.
          ORPHANS=(
            "AZURE_TTS_REGION "
          )
          for name in "${ORPHANS[@]}"; do
            echo "  → deleting CF Pages env var: [$name] (len=${#name})"
            # `pages secret delete` works for both secret_text and plain_text
            # entries — it removes whatever entry has that name regardless
            # of type.
            npx --yes wrangler@3 pages secret delete "$name" \
              --project-name=nasa-hrvatska-v2 \
              --yes >/dev/null 2>&1 || echo "    (not present — no-op)"
          done
          echo "===== Cleanup pass complete ====="
