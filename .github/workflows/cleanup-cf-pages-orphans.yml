name: Cleanup CF Pages orphan env vars

on:
  workflow_dispatch:

# One-shot maintenance workflow: removes CF Pages env-var entries whose
# NAMES are corrupted (trailing whitespace, etc.) from clipboard-paste
# bugs in the CF dashboard form. Each orphan is listed explicitly here —
# we never delete by regex / batch, only the names enumerated below.
#
# Safe to re-run: wrangler's delete is a no-op when the name doesn't
# exist. Once the orphan is gone, this workflow stays in place but
# becomes a no-op too.

jobs:
  cleanup:
    name: Delete enumerated orphan env vars
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Delete orphans
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # NB: the trailing space in the name below is intentional — that's
          # the actual orphan key on CF Pages. URL-encoded to "%20" so the
          # CF API path resolves to the exact name including the space.
          # wrangler `pages secret delete` only handles secret_text entries,
          # so plain_text orphans need the raw API.
          ORPHANS=(
            "AZURE_TTS_REGION "
          )
          for name in "${ORPHANS[@]}"; do
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$name")
            echo "  → deleting CF Pages env var: [$name] (len=${#name}, encoded=$encoded)"
            RESPONSE=$(curl -s -w "\n__STATUS__%{http_code}" -X PATCH \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg n "$name" '{ deployment_configs: { production: { env_vars: { ($n): null } } } }')")
            STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/__STATUS__//')
            BODY=$(echo "$RESPONSE" | sed '$d')
            if [ "$STATUS" = "200" ]; then
              echo "    ✓ removed"
            else
              echo "    ✗ HTTP $STATUS — $(echo "$BODY" | jq -c '.errors // .' 2>/dev/null)"
            fi
          done
          echo "===== Cleanup pass complete ====="
