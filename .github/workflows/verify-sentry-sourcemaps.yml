name: Verify Sentry source-map upload

# Manual check that the Cloudflare Pages production build actually ran the
# @sentry/vite-plugin and uploaded source maps. Also cross-checks the Sentry API.
# Run: gh workflow run verify-sentry-sourcemaps.yml
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Inspect latest CF Pages build log + Sentry artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check build log and Sentry
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          PROJECT=nasa-hrvatska-v2
          cf() { curl -sf -H "Authorization: Bearer $CF_TOKEN" "$@"; }

          echo "===== Latest PRODUCTION deployment ====="
          DEPLOYS=$(cf "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/deployments")
          DID=$(echo "$DEPLOYS" | jq -r '[.result[] | select(.environment=="production")] | .[0].id')
          DSHA=$(echo "$DEPLOYS" | jq -r '[.result[] | select(.environment=="production")] | .[0].deployment_trigger.metadata.commit_hash // "unknown"')
          DSTAGE=$(echo "$DEPLOYS" | jq -r '[.result[] | select(.environment=="production")] | .[0].latest_stage.status // "unknown"')
          echo "deployment id : $DID"
          echo "commit        : $DSHA"
          echo "stage status  : $DSTAGE"

          # NOTE: CF's deployments/.../history/logs endpoint only returns
          # deployment-STAGE events (clone/checkout), NOT the `vite build` stdout
          # where @sentry/vite-plugin logs. So it cannot confirm the upload —
          # the authoritative signal is the Sentry artifact-bundles API below.
          echo "===== CF deployment stage log (informational only) ====="
          cf "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/deployments/$DID/history/logs" \
            | jq -r '.result.data[].line' 2>/dev/null | head -20 || echo "(no stage log)"

          echo "===== AUTHORITATIVE check: Sentry artifact bundles ====="
          # Modern @sentry/vite-plugin uploads debug-id ARTIFACT BUNDLES (not legacy
          # release "files"), so this endpoint — not releases/{v}/files — is the
          # real evidence that source maps landed in Sentry. fileCount>0 on a fresh
          # bundle == upload working in the production build.
          sentry() { curl -sf -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" "$@"; }

          echo "Recent releases (name = BUILD_ID timestamp):"
          sentry "https://sentry.io/api/0/organizations/$SENTRY_ORG/releases/?per_page=3" \
            | jq -r '.[]? | "  \(.version)  created=\(.dateCreated)"' || echo "  (none / API error)"

          echo "Artifact bundles (debug-id based):"
          BUNDLES=$(sentry "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/files/artifact-bundles/?per_page=5" || echo '[]')
          echo "$BUNDLES" | jq -r '.[]? | "  bundleId=\(.bundleId)  fileCount=\(.fileCount)  date=\(.date)"' \
            || echo "  (artifact-bundles endpoint returned nothing)"

          NEWEST_FILES=$(echo "$BUNDLES" | jq -r '[.[]?.fileCount] | max // 0')
          echo "===== Verdict ====="
          if [ "${NEWEST_FILES:-0}" -gt 0 ]; then
            echo "PASS: Sentry holds source-map artifact bundles (newest has $NEWEST_FILES files)."
            echo "      => @sentry/vite-plugin runs in the CF production build and uploads succeed."
          else
            echo "::error::No Sentry artifact bundles with files found — source-map upload is NOT working."
            exit 1
          fi
