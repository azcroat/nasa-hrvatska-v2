name: Sonar Gate Fix

# On-demand maintenance workflow: ensure the project's quality gate is the
# Clean-as-You-Code gate (new_reliability_rating A + new_security_rating A) and
# print every SonarCloud API response + HTTP code so failures are diagnosable.
# Run with: gh workflow run sonar-gate-fix.yml
on:
  workflow_dispatch:

jobs:
  fix-gate:
    name: Assign NH_CleanCode gate
    runs-on: ubuntu-latest
    steps:
      - name: Configure & verify SonarCloud quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set +e
          ORG="azcroat"
          PROJECT="AzCroat_nasa-hrvatska-v2"
          QG="NH_CleanCode"
          api() { curl -sS -u "$SONAR_TOKEN:" -w $'\nHTTP:%{http_code}\n' "$@"; }

          echo "### whoami (token validity + permissions)"
          api "https://sonarcloud.io/api/users/current"
          echo "### LIST GATES"
          api "https://sonarcloud.io/api/qualitygates/list?organization=$ORG"
          echo "### CREATE GATE $QG"
          api -X POST "https://sonarcloud.io/api/qualitygates/create" -d "name=$QG&organization=$ORG"
          echo "### ADD CONDITION new_reliability_rating"
          api -X POST "https://sonarcloud.io/api/qualitygates/create_condition" --data-urlencode "gateName=$QG" -d "metric=new_reliability_rating&op=GT&error=1&organization=$ORG"
          echo "### ADD CONDITION new_security_rating"
          api -X POST "https://sonarcloud.io/api/qualitygates/create_condition" --data-urlencode "gateName=$QG" -d "metric=new_security_rating&op=GT&error=1&organization=$ORG"
          echo "### SELECT gate for project (gateName)"
          api -X POST "https://sonarcloud.io/api/qualitygates/select" --data-urlencode "gateName=$QG" -d "projectKey=$PROJECT&organization=$ORG"
          echo "### VERIFY get_by_project"
          api "https://sonarcloud.io/api/qualitygates/get_by_project?organization=$ORG&project=$PROJECT"
          echo "### DONE"
