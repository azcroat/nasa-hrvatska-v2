name: cf-dmarc-audit
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve zone + token
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          Z=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $T" | jq -r '.result[0].id')
          echo "zone-id=$Z" >> "$GITHUB_OUTPUT"
          echo "token-clean=$T" >> "$GITHUB_OUTPUT"

      - name: List ALL TXT records (DMARC, SPF, DKIM all live here)
        env:
          T: ${{ steps.zone.outputs.token-clean }}
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          echo "=== Raw response from DNS list endpoint ==="
          curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$Z/dns_records?type=TXT&per_page=100" \
            -H "Authorization: Bearer $T" | jq .

      - name: Specifically check _dmarc record
        env:
          T: ${{ steps.zone.outputs.token-clean }}
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set -e
          echo "=== _dmarc.nasahrvatska.com ==="
          curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$Z/dns_records?type=TXT&name=_dmarc.nasahrvatska.com" \
            -H "Authorization: Bearer $T" \
            | jq .
