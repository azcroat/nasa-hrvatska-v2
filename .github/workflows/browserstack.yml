name: BrowserStack Cross-Device Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  browserstack:
    name: BrowserStack Real Devices
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Verify BrowserStack plan
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          echo "Checking BrowserStack plan..."
          curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            https://api.browserstack.com/automate/plan.json
          echo ""

      - name: Run BrowserStack Automate
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npx browserstack-node-sdk playwright test --config=browserstack.playwright.config.js

      - name: Upload BrowserStack report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browserstack-report
          path: browserstack-report/
          retention-days: 30
