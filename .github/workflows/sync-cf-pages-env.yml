name: Sync CF Pages env vars

on:
  workflow_dispatch:

jobs:
  sync:
    name: Push env vars to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Patch CF Pages project env vars
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          set -euo pipefail
          # VITE_-prefixed vars are read by Vite at BUILD time → embedded in the
          # client bundle. The bare-named vars (FIREBASE_PROJECT_ID) are read
          # at RUNTIME by CF Pages Functions for token verification, KV access,
          # etc. They are separate concerns and both must be set.
          BODY=$(jq -n \
            --arg api_key "$API_KEY" \
            --arg auth_domain "$AUTH_DOMAIN" \
            --arg project_id "$PROJECT_ID" \
            --arg storage_bucket "$STORAGE_BUCKET" \
            --arg messaging_sender_id "$MESSAGING_SENDER_ID" \
            --arg app_id "$APP_ID" \
            --arg sentry_dsn "$SENTRY_DSN" \
            '{
              deployment_configs: {
                production: {
                  env_vars: {
                    VITE_FIREBASE_API_KEY: { value: $api_key, type: "plain_text" },
                    VITE_FIREBASE_AUTH_DOMAIN: { value: $auth_domain, type: "plain_text" },
                    VITE_FIREBASE_PROJECT_ID: { value: $project_id, type: "plain_text" },
                    VITE_FIREBASE_STORAGE_BUCKET: { value: $storage_bucket, type: "plain_text" },
                    VITE_FIREBASE_MESSAGING_SENDER_ID: { value: $messaging_sender_id, type: "plain_text" },
                    VITE_FIREBASE_APP_ID: { value: $app_id, type: "plain_text" },
                    VITE_SENTRY_DSN: { value: $sentry_dsn, type: "plain_text" },
                    FIREBASE_PROJECT_ID: { value: $project_id, type: "plain_text" }
                  }
                }
              }
            }')
          RESPONSE=$(curl -sf -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESPONSE" | jq '.success, (.errors // "no errors")'

      - name: Trigger CF Pages redeploy
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2/deployments" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "branch=master")
          echo "$RESPONSE" | jq '.success, .result.id'
