name: Sync CF Pages env vars

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Push env vars to Cloudflare Pages via wrangler
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Push each secret with wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          # The CF Pages project-level PATCH endpoint started returning
          # 8000006 "Request body is incorrect" on 2026-05-21 (also tested
          # the dedicated /deployment_configs/{env} endpoint — same 400).
          # The supported CI path is wrangler `pages secret put`, which
          # stores values as encrypted secrets (still available at runtime
          # as env.VAR_NAME — same access pattern as plain_text env vars,
          # better security at rest).
          #
          # GH Secrets pasted from a clipboard frequently carry trailing
          # \r\n; tr -d '[:space:]' strips that so the value at runtime
          # exactly matches what the Firebase project expects.
          # See memory/feedback_secret_paste_whitespace.md.

          strip() { printf '%s' "$1" | tr -d '[:space:]'; }

          push_secret() {
            local name="$1" value="$2"
            local clean
            clean=$(strip "$value")
            local len=${#clean}
            if [ "$len" -eq 0 ]; then
              echo "::error::Secret $name is empty — refusing to overwrite the live value with nothing"
              return 1
            fi
            echo "  → $name ($len chars, stripped)"
            printf '%s' "$clean" | npx --yes wrangler@3 pages secret put "$name" \
              --project-name=nasa-hrvatska-v2 >/dev/null
          }

          echo "===== Pushing secrets to CF Pages production ====="
          push_secret VITE_FIREBASE_API_KEY            "$API_KEY"
          push_secret VITE_FIREBASE_AUTH_DOMAIN        "$AUTH_DOMAIN"
          push_secret VITE_FIREBASE_PROJECT_ID         "$PROJECT_ID"
          push_secret VITE_FIREBASE_STORAGE_BUCKET     "$STORAGE_BUCKET"
          push_secret VITE_FIREBASE_MESSAGING_SENDER_ID "$MESSAGING_SENDER_ID"
          push_secret VITE_FIREBASE_APP_ID             "$APP_ID"
          push_secret VITE_SENTRY_DSN                  "$SENTRY_DSN"
          # Sentry source-map upload — build-time only, NOT VITE_-prefixed so
          # they never reach the browser bundle. Used by @sentry/vite-plugin.
          push_secret SENTRY_AUTH_TOKEN                "$SENTRY_AUTH_TOKEN"
          push_secret SENTRY_ORG                       "$SENTRY_ORG"
          push_secret SENTRY_PROJECT                   "$SENTRY_PROJECT"
          echo "===== All secrets pushed ====="

      - name: Trigger CF Pages redeploy
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2/deployments" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "branch=master")
          echo "$RESPONSE" | jq '.success, .result.id'
