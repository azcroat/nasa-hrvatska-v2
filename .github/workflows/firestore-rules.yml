name: Firestore Security Rules

# Runs on every push and pull request that touches rules or tests.
on:
  push:
    paths:
      - 'firestore.rules'
      - 'src/tests/firestore-rules.test.js'
      - 'vitest.rules.config.js'
      - 'firebase.json'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'src/tests/firestore-rules.test.js'
      - 'firebase.json'

jobs:
  rules-test:
    name: Firestore Rules Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # firebase-tools requires Java 21+ as of early 2025.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download Firestore Emulator binary
        # Pre-downloads the JAR so the test step starts immediately.
        run: npx firebase setup:emulators:firestore || true
        env:
          CI: true

      - name: Run Firestore security rules tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project nasa-hrvatska-test \
            "npx vitest run --config vitest.rules.config.js"
        env:
          CI: true
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
