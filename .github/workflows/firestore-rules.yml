name: Firestore Security Rules

# Runs on every push and pull request that touches rules or tests.
# GitHub Actions ubuntu-latest includes Java 17 (required by the Firebase Emulator).
on:
  push:
    paths:
      - 'firestore.rules'
      - 'src/tests/firestore-rules.test.js'
      - 'firebase.json'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'src/tests/firestore-rules.test.js'
      - 'firebase.json'

jobs:
  rules-test:
    name: Firestore Rules Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Java 17 is pre-installed on ubuntu-latest; this step makes the version explicit
      # and documents the dependency. Remove if the runner Java version causes issues.
      - name: Verify Java (required by Firebase Emulator)
        run: java -version

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download Firestore Emulator binary
        # Runs the emulator once with a timeout to download the JAR, then exits.
        # This caches the binary so the test step starts immediately.
        run: |
          npx firebase setup:emulators:firestore || true
        env:
          # Suppress interactive prompts
          CI: true

      - name: Run Firestore security rules tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project nasa-hrvatska-test \
            "npx vitest run --config vitest.rules.config.js"
        env:
          CI: true
          # Tell @firebase/rules-unit-testing to connect to the local emulator
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
