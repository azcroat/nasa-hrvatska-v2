name: Security Audit

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 7 * * 1'  # Weekly Monday 7am UTC

jobs:
  trivy:
    name: Trivy (CVE + Secret Scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # SHA-pinned (v0.36.0, published 2026-04-22) — never use @master for third-party
      # actions: any push to that branch gets executed in CI with our GITHUB_TOKEN.
      # Update by running: gh api repos/aquasecurity/trivy-action/git/refs/tags/<version>
      - name: Trivy — dependency CVEs and secrets
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln,secret

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Semgrep — OWASP Top 10 + React + JS patterns
        run: |
          pip install semgrep --quiet
          semgrep --config=auto --sarif --output=semgrep.sarif src/ || true

      - name: Upload Semgrep results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
