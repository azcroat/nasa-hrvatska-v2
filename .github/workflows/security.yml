name: Security Audit

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 7 * * 1'  # Weekly Monday 7am UTC

jobs:
  # Trivy removed 2026-06-06 per owner request. Replacement coverage:
  #  - Dependency CVEs  -> OSV-Scanner + npm audit + Dependabot (security updates ON).
  #  - Secret scanning  -> GitHub native secret scanning + push protection (ON at the
  #    platform level) PLUS the Gitleaks job below for custom patterns + full git history.
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so previously-committed secrets are caught
      # SHA-pinned (gitleaks-action v2). Free for public/personal repos (no license).
      - name: Gitleaks — repo + history secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Semgrep — OWASP Top 10 + React + JS patterns
        run: |
          pip install semgrep --quiet
          semgrep --config=auto --sarif --output=semgrep.sarif src/ || true

      - name: Upload Semgrep results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
