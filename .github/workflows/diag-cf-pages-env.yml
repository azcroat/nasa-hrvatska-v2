name: Diag CF Pages env (read-only)

on:
  workflow_dispatch:

jobs:
  diag:
    name: Read CF Pages project + production deployment config
    runs-on: ubuntu-latest
    steps:
      - name: GET project state
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "===== GET /pages/projects/nasa-hrvatska-v2 ====="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | jq '{
                success: .success,
                errors: .errors,
                production_env_var_names: (.result.deployment_configs.production.env_vars // {} | keys),
                preview_env_var_names: (.result.deployment_configs.preview.env_vars // {} | keys),
                production_env_var_count: (.result.deployment_configs.production.env_vars // {} | length),
                production_compatibility_flags: .result.deployment_configs.production.compatibility_flags,
                production_compatibility_date: .result.deployment_configs.production.compatibility_date
              }'

          echo ""
          echo "===== GET deployment_configs/production directly (newer endpoint) ====="
          curl -s -w "\n__STATUS__%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/nasa-hrvatska-v2/deployment_configs/production" \
            -H "Authorization: Bearer $CF_TOKEN" || true
