name: cf-skip-bot-on-api
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    # CF token read per-job + stripped inside each step (not via $GITHUB_OUTPUT).
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Resolve zone ID
        id: zone
        run: |
          set -e
          TOKEN=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          ZONE_ID=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.result[0].id')
          echo "zone-id=$ZONE_ID" >> "$GITHUB_OUTPUT"

      # Try PATCH for every zone-settings endpoint that could be the bot trigger.
      # Print HTTP status + body for each; non-200 = scope-blocked.
      - name: PATCH bot_fight_mode = off
        env:
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          curl -sS -i -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$Z/settings/bot_fight_mode" \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"value":"off"}' \
            -w '\n--- HTTP %{http_code} ---\n' | tail -10

      - name: PATCH browser_check = off
        env:
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$Z/settings/browser_check" \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"value":"off"}' \
            -w '\n--- HTTP %{http_code} ---\n'

      - name: PATCH challenge_ttl = 31536000 (1 year cache for solved challenges)
        env:
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$Z/settings/challenge_ttl" \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"value":31536000}' \
            -w '\n--- HTTP %{http_code} ---\n'

      # Try Rulesets API for the http_request_firewall_custom phase
      # (= WAF Custom Rules, separate from Page Rules).
      - name: Create WAF Custom Rule to skip on /api/*
        env:
          Z: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          # Get the current http_request_firewall_custom ruleset entrypoint
          RS=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$Z/rulesets" \
            -H "Authorization: Bearer $T" | jq -r '.result[] | select(.phase == "http_request_firewall_custom") | .id' | head -n1)
          echo "Existing http_request_firewall_custom ruleset: $RS"
          if [ -z "$RS" ] || [ "$RS" = "null" ]; then
            BODY=$(jq -n '{
              name: "nh-api-skip",
              kind: "zone",
              phase: "http_request_firewall_custom",
              rules: [{
                expression: "(starts_with(http.request.uri.path, \"/api/\"))",
                action: "skip",
                action_parameters: {
                  ruleset: "current"
                },
                description: "Skip WAF on /api/* (auth + quota handle abuse)"
              }]
            }')
            curl -sS -i -X POST \
              "https://api.cloudflare.com/client/v4/zones/$Z/rulesets" \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              -w '\n--- HTTP %{http_code} ---\n'
          fi
