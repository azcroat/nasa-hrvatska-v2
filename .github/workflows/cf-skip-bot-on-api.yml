name: cf-skip-bot-on-api
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          ZONE_ID=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')
          echo "zone-id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "Zone: $ZONE_ID"

      - name: Verbose PATCH security_level — debug raw HTTP
        id: zs
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          # Print HTTP status, response headers, and body together. Trim any
          # newline/whitespace in the token in case the secret has one.
          TOKEN_CLEAN=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          echo "Token length: ${#CF_TOKEN}, cleaned length: ${#TOKEN_CLEAN}"
          curl -sS -i -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/settings/security_level" \
            -H "Authorization: Bearer $TOKEN_CLEAN" \
            -H "Content-Type: application/json" \
            -d '{"value":"essentially_off"}' \
            -w '\n--- HTTP %{http_code} | %{size_upload}B uploaded ---\n'

      - name: Verbose Page Rule POST — debug raw HTTP
        id: pr
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          TOKEN_CLEAN=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          # Use jq to build the JSON safely
          BODY=$(jq -n \
            --arg url "*nasahrvatska.com/api/*" \
            '{
              targets: [{ target: "url", constraint: { operator: "matches", value: $url } }],
              actions: [
                { id: "security_level", value: "essentially_off" },
                { id: "browser_integrity_check", value: "off" }
              ],
              priority: 1,
              status: "active"
            }')
          echo "Body to send: $BODY"
          curl -sS -i -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/pagerules" \
            -H "Authorization: Bearer $TOKEN_CLEAN" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w '\n--- HTTP %{http_code} ---\n'
