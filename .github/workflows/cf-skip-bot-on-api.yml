name: cf-skip-bot-on-api
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          TOKEN=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          ZONE_ID=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.result[0].id')
          echo "zone-id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "token-clean=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Inspect current bot_management config
        env:
          TOKEN: ${{ steps.zone.outputs.token-clean }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/bot_management" \
            -H "Authorization: Bearer $TOKEN" | jq .

      - name: Create Page Rule disable_security for /api/*
        id: pr
        continue-on-error: true
        env:
          TOKEN: ${{ steps.zone.outputs.token-clean }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          BODY=$(jq -n '{
            targets: [{ target: "url", constraint: { operator: "matches", value: "*nasahrvatska.com/api/*" } }],
            actions: [
              { id: "disable_security", value: "on" }
            ],
            priority: 1,
            status: "active"
          }')
          echo "PR body: $BODY"
          curl -sS -i -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/pagerules" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w '\n--- HTTP %{http_code} ---\n'

      - name: Restore zone-wide security_level to medium
        env:
          TOKEN: ${{ steps.zone.outputs.token-clean }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/settings/security_level" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value":"medium"}' \
            -w '\n--- HTTP %{http_code} ---\n'
