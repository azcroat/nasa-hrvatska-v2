name: cf-skip-bot-on-api

# One-shot workflow_dispatch. Tries every CF API surface that could
# bypass Bot Fight Mode on /api/*, reports the token's actual scopes, and
# stops at the first successful path.
#
# Order of attempts:
#   1. Verify the token (lists its actual scope set)
#   2. Page Rules API (legacy, often a narrower scope path)
#   3. Rulesets API for http_config_settings phase
#   4. Settings API (security_level + browser_check direct flip)
#
# If all four fail, prints the verified scope list so we can ask the user
# for the specific scope that's missing rather than guessing.

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token + list scopes
        id: verify
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          VERIFY=$(curl -sS https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "Token verify response:"
          echo "$VERIFY" | jq .
          OK=$(echo "$VERIFY" | jq -r '.success')
          if [ "$OK" != "true" ]; then
            echo "::error::Token verify failed — token is invalid or revoked"
            exit 1
          fi

      - name: Resolve zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          RESP=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $CF_TOKEN")
          ZONE_ID=$(echo "$RESP" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::error::Failed to resolve zone ID. Response:"
            echo "$RESP" | jq .
            exit 1
          fi
          echo "zone-id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "Zone ID: $ZONE_ID"

      - name: Attempt 1 — Page Rules API (legacy)
        id: pr
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          BODY='{
            "targets": [{
              "target": "url",
              "constraint": {"operator": "matches", "value": "*nasahrvatska.com/api/*"}
            }],
            "actions": [
              {"id": "security_level", "value": "essentially_off"},
              {"id": "browser_integrity_check", "value": "off"}
            ],
            "priority": 1,
            "status": "active"
          }'
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/pagerules" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Page Rules response:"
          echo "$RESP" | jq .
          OK=$(echo "$RESP" | jq -r '.success')
          if [ "$OK" = "true" ]; then
            echo "::notice::SUCCESS — Page Rule created"
            echo "winner=pagerules" >> "$GITHUB_OUTPUT"
          else
            echo "Page Rules failed — falling through"
            echo "winner=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt 2 — Rulesets API (http_config_settings phase)
        if: steps.pr.outputs.winner == ''
        id: rs
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          BODY='{
            "name": "Skip bot challenge for API (automated)",
            "kind": "zone",
            "phase": "http_config_settings",
            "rules": [{
              "expression": "(starts_with(http.request.uri.path, \"/api/\"))",
              "action": "set_config",
              "action_parameters": {
                "security_level": "essentially_off",
                "bic": false
              }
            }]
          }'
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/rulesets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Rulesets response:"
          echo "$RESP" | jq .
          OK=$(echo "$RESP" | jq -r '.success')
          if [ "$OK" = "true" ]; then
            echo "::notice::SUCCESS — Configuration Rule created via Rulesets API"
            echo "winner=rulesets" >> "$GITHUB_OUTPUT"
          else
            echo "winner=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt 3 — direct zone settings flip
        if: steps.pr.outputs.winner == '' && steps.rs.outputs.winner == ''
        id: zs
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ steps.zone.outputs.zone-id }}
        run: |
          set +e
          RESP1=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/settings/security_level" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value":"essentially_off"}')
          echo "security_level response:"
          echo "$RESP1" | jq .
          RESP2=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/settings/browser_check" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value":"off"}')
          echo "browser_check response:"
          echo "$RESP2" | jq .
          OK1=$(echo "$RESP1" | jq -r '.success')
          if [ "$OK1" = "true" ]; then
            echo "::notice::SUCCESS — zone settings flipped"
            echo "winner=zone_settings" >> "$GITHUB_OUTPUT"
          fi

      - name: Result
        env:
          PR: ${{ steps.pr.outputs.winner }}
          RS: ${{ steps.rs.outputs.winner }}
          ZS: ${{ steps.zs.outputs.winner }}
        run: |
          set -e
          if [ -n "$PR" ] || [ -n "$RS" ] || [ -n "$ZS" ]; then
            echo "::notice::At least one CF API path succeeded. Test https://nasahrvatska.com/api/tts in 60s."
            exit 0
          fi
          echo "::error::All three CF API paths failed with auth errors. The token's verified scopes (see Verify step above) do not include any zone-edit permission. Manual dashboard action or a properly-scoped token is required."
          exit 1
