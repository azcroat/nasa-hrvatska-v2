name: Disable CF Bot Fight Mode

on:
  workflow_dispatch:

jobs:
  disable-bot-fight-mode:
    name: Disable Bot Fight Mode on nasahrvatska.com
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID for nasahrvatska.com
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "Zone lookup response:"
          echo "$RESPONSE" | jq '{success: .success, errors: .errors, zone_id: .result[0].id, zone_name: .result[0].name, plan: .result[0].plan.name}'
          ZONE_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "ERROR: Could not find zone ID for nasahrvatska.com"
            exit 1
          fi
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "Zone ID: $ZONE_ID"

      - name: Disable Bot Fight Mode (bot_management endpoint)
        id: bot_mgmt
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/bot_management" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"fight_mode": false}')
          echo "bot_management PATCH response:"
          echo "$RESPONSE" | jq '{success: .success, errors: .errors, fight_mode: .result.fight_mode}'
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          echo "success=$SUCCESS" >> "$GITHUB_OUTPUT"

      - name: Fallback — disable via zone settings if bot_management returned error
        if: steps.bot_mgmt.outputs.success != 'true'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -euo pipefail
          echo "bot_management endpoint did not succeed. Attempting legacy zone settings..."

          # List all zone settings to find relevant bot-fight keys
          echo "--- Zone settings (bot/challenge related) ---"
          curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            | jq '[.result[] | select(.id | test("bot|fight|challenge|security"))]'

          # Try patching security_level to essentially low as a fallback
          echo "--- Attempting security_level patch to essentially_off ---"
          RESPONSE=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/security_level" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value": "essentially_off"}')
          echo "$RESPONSE" | jq '{success: .success, errors: .errors, value: .result.value}'

          echo ""
          echo "DIAGNOSTIC: Bot Fight Mode may require a paid plan (Pro+) to control via API."
          echo "If both attempts failed, disable manually in CF Dashboard:"
          echo "  Security > Bots > Bot Fight Mode toggle"

      - name: Confirm final bot_management state
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -euo pipefail
          echo "--- Final bot_management state ---"
          curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/bot_management" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            | jq '{success: .success, fight_mode: .result.fight_mode, using_latest_model: .result.using_latest_model}'
