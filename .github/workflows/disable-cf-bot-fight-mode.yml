name: Disable CF Bot Fight Mode

on:
  workflow_dispatch:

jobs:
  disable:
    name: Disable Bot Fight Mode on nasahrvatska.com
    runs-on: ubuntu-latest
    steps:
      - name: Probe + disable via multiple endpoints
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e

          echo "=== Token verify ==="
          curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" | jq '.success, .result.status, .errors // "ok"'

          echo "=== Zone lookup ==="
          ZONE_RESP=$(curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com")
          ZONE_ID=$(echo "$ZONE_RESP" | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"
          if [ "$ZONE_ID" = "null" ] || [ -z "$ZONE_ID" ]; then
            echo "Zone lookup failed: $ZONE_RESP"
            exit 1
          fi

          ATTEMPTS_FAILED=0

          echo "=== Attempt 1: bot_management endpoint ==="
          R=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/bot_management" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"fight_mode": false}')
          echo "$R" | jq -c '.'
          SUCCESS=$(echo "$R" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then ATTEMPTS_FAILED=$((ATTEMPTS_FAILED+1)); fi

          echo "=== Attempt 2: settings/security_level to essentially_off ==="
          R=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/security_level" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value": "essentially_off"}')
          echo "$R" | jq -c '.'

          echo "=== Attempt 3: settings/browser_check off ==="
          R=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/browser_check" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value": "off"}')
          echo "$R" | jq -c '.'

          echo "=== Attempt 4: settings/rocket_loader off ==="
          R=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/rocket_loader" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value": "off"}')
          echo "$R" | jq -c '.'

          echo "=== Probe all zone settings token can read ==="
          curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings" 2>/dev/null \
            | jq '.result | map({id, value, editable})' 2>/dev/null | head -100 || echo "no read access"

          echo ""
          echo "=== Verify by fetching the live page ==="
          sleep 30
          if curl -sL https://nasahrvatska.com/ | grep -q "cdn-cgi/challenge-platform"; then
            echo "RESULT: bot challenge script STILL injected"
            echo "Token does not have sufficient scope. User must toggle in CF Dashboard."
            exit 1
          else
            echo "RESULT: bot challenge script NO LONGER injected — success!"
          fi
