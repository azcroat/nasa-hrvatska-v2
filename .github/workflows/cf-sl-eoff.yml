name: cf-sl-eoff
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          T=$(echo -n "$CF_TOKEN" | tr -d '[:space:]')
          Z=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=nasahrvatska.com" \
            -H "Authorization: Bearer $T" | jq -r '.result[0].id')
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$Z/settings/security_level" \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"value":"essentially_off"}' -w '\n%{http_code}\n'
