name: Android Release Build

# Triggered by a version tag push (e.g. v2.0.1) or manually via workflow_dispatch.
# Builds a signed Android App Bundle (.aab) and attaches it as a GitHub Release artifact.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   — base64-encoded contents of nasa-hrvatska-release.jks
#                       Generate with: base64 -i nasa-hrvatska-release.jks | pbcopy
#   KEYSTORE_PASS     — keystore password
#   KEY_ALIAS         — key alias (nasa-hrvatska)
#   KEY_PASS          — key password
#
# Optional (for automatic Play Store upload via Google Play API):
#   PLAY_SERVICE_ACCOUNT_JSON — base64-encoded Google Play service account JSON
#                                (from Google Cloud Console → Service accounts)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to upload to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: android-release
  cancel-in-progress: false  # never cancel a release build mid-flight

jobs:
  build:
    name: Build & Sign AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Set up Java 17 (required for Android Gradle) ──────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Set up Android SDK ────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install Node dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build web app ─────────────────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build
        env:
          # Pass build-time env vars if needed (e.g. Firebase config)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── 7. Sync Capacitor web assets to Android ───────────────────────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 8. Decode and write keystore ─────────────────────────────────────────
      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/nasa-hrvatska-release.jks

      # ── 9. Build release AAB ─────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/nasa-hrvatska-release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}

      # ── 10. Extract version from build.gradle ────────────────────────────────
      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle | head -1 | grep -o '".*"' | tr -d '"')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | head -1 | grep -o '[0-9]*')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code $VERSION_CODE)"

      # ── 11. Rename AAB with version ──────────────────────────────────────────
      - name: Rename AAB artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/bundle/release/app-release.aab \
             release-artifacts/nasa-hrvatska-v${{ steps.version.outputs.name }}-code${{ steps.version.outputs.code }}.aab

      # ── 12. Upload AAB as artifact ───────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasa-hrvatska-aab-v${{ steps.version.outputs.name }}
          path: release-artifacts/*.aab
          retention-days: 30

      # ── 13. Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.aab
          name: v${{ steps.version.outputs.name }} (Play Store code ${{ steps.version.outputs.code }})
          body: |
            ## Naša Hrvatska v${{ steps.version.outputs.name }}

            **Play Store version code:** ${{ steps.version.outputs.code }}

            ### Upload to Play Store
            1. Download the `.aab` artifact attached to this release
            2. Go to [Play Console](https://play.google.com/console) → Naša Hrvatska
            3. Create a new release in your chosen track (Internal → Alpha → Beta → Production)
            4. Upload the `.aab` file
            5. Add release notes in Croatian and English
            6. Review and publish

            ### Checklist before publishing
            - [ ] Tested on physical Android device
            - [ ] ANR / crash rate acceptable in Android Vitals
            - [ ] Release notes written
            - [ ] Screenshot updates if UI changed
          draft: false
          prerelease: false

      # ── 14. Shred keystore from runner temp ──────────────────────────────────
      - name: Shred keystore
        if: always()
        run: shred -u ${{ runner.temp }}/nasa-hrvatska-release.jks 2>/dev/null || true
