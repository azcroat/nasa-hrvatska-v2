version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zagreb"
    open-pull-requests-limit: 8
    # Auto-group minor/patch updates to avoid PR noise
    groups:
      eslint-toolchain:
        patterns:
          - "eslint*"
          - "@eslint*"
          - "globals"
        update-types:
          - "minor"
          - "patch"
      vite-toolchain:
        patterns:
          - "vite*"
          - "@vitejs*"
          - "vite-plugin-pwa"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest*"
          - "@testing-library*"
          - "@playwright*"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    # Always flag security updates individually — never group them
    ignore:
      # vite 8 switches to the Rolldown bundler, which breaks our build
      # (transformWithEsbuild / missing esbuild) and the manualChunks firebase
      # isolation + size-limit checks. We deliberately upgraded to vite 7 (#89)
      # instead; vite 8 / Rolldown is a separately-scoped migration. Remove these
      # ignores to revisit vite 8. (@vitejs/plugin-react v6 is vite-8-only.)
      - dependency-name: "vite"
        versions: [">=8.0.0"]
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6.0.0"]
      # React 19 is a deliberate, separately-scoped migration — not a drive-by
      # bump. Dependabot also proposed it inconsistently (react 19 while
      # react-dom stayed 18), which would break the app. We stay on React 18
      # (~18.3.1) until React 19 is migrated as its own task. Remove these to
      # revisit. (@types/react may lead at 19; the runtime packages are gated.)
      - dependency-name: "react"
        versions: [">=19.0.0"]
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]

  # GitHub Actions — monthly sweep is enough
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
