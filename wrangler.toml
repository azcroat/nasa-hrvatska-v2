# wrangler.toml — Cloudflare Workers configuration for scheduled cron jobs.
# Naša Hrvatska app is deployed via Cloudflare Pages (auto-deploy on git push).
# This file configures the SEPARATE scheduled worker for push notification crons.
#
# ── Deploy instructions ───────────────────────────────────────────────────────
# 1. Create KV namespace:
#      wrangler kv:namespace create PUSH_SUBSCRIPTIONS
# 2. Copy the returned namespace ID into [[kv_namespaces]] id below
# 3. Set env vars in Cloudflare dashboard (not here):
#      CRON_SECRET         — any random secret string (used to auth cron → API calls)
#      VAPID_PRIVATE_KEY   — VAPID private key for web push signing
#      VAPID_PUBLIC_KEY    — VAPID public key (sent to browser on subscribe)
#      PAGES_URL           — https://nasahrvatska.com
# 4. Deploy once: wrangler deploy
#    (Cloudflare then runs the cron automatically — no further manual steps)
#
# ── Pages Functions KV bindings (managed automatically by CI) ────────────────
# The following KV namespaces are bound to the Pages project (not this Worker).
# They are provisioned and bound automatically on each deploy via:
#   node scripts/setup-cf-resources.mjs
# or manually:
#   npm run setup:cf
#
# Pages KV bindings (production + preview):
#   NH_CLANS      (title: nasa-hrvatska-clans)   — Study clan cohort data
#   XP_VELOCITY   (title: nasa-hrvatska-xp-velocity) — Per-user XP velocity window
#
# To create XP_VELOCITY:
#   1. node scripts/setup-cf-resources.mjs   (creates + binds automatically)
#   OR manually:
#   2. wrangler kv:namespace create nasa-hrvatska-xp-velocity
#   3. Bind to Pages project in Cloudflare Dashboard →
#      Pages → nasa-hrvatska-v2 → Settings → Functions → KV namespace bindings
#      Variable name: XP_VELOCITY
#
# Pages env vars required (set in Dashboard → Pages → Settings → Env Vars):
#   FIREBASE_PROJECT_ID   — Firebase project ID for token verification
#   ANTHROPIC_API_KEY     — Claude API (AI features + speaking rubric scoring)
#   AZURE_TTS_KEY         — Azure Text-to-Speech
#   AZURE_TTS_REGION      — Azure TTS region (e.g. westeurope)
#   VAPID_PRIVATE_KEY     — Web push signing
#   VAPID_PUBLIC_KEY      — Web push public key
#   CRON_SECRET           — Shared with scheduled worker above
#   (Workers AI binding "AI" — Whisper STT for /api/assess-speaking)

name                  = "nasa-hrvatska-scheduler"
main                  = "functions/scheduled.js"
compatibility_date    = "2024-09-23"
compatibility_flags   = ["nodejs_compat"]
workers_dev           = false
preview_urls          = false

[triggers]
# 13:00 UTC = 8 AM Eastern Daylight / 9 AM Eastern Standard / 5 AM Pacific Daylight.
# Picked for the current US-based audience cohort — was 9 UTC (5 AM ET / 4 AM CT),
# which fired in dead-of-night for Central/Mountain/Pacific users.
# When audience expands beyond US: implement per-user TZ-aware sends in scheduled.js.
crons = ["0 13 * * *"]   # 8am Eastern daily — streak reminder push

# ── KV namespace binding ───────────────────────────────────────────────────────
# Replace REPLACE_WITH_ACTUAL_NAMESPACE_ID with output of:
#   wrangler kv:namespace create PUSH_SUBSCRIPTIONS
[[kv_namespaces]]
binding    = "PUSH_SUBSCRIPTIONS"
id         = "4652e2388967424db09395a2be0aad81"

# ── D1 database binding ──────────────────────────────────────────────────────
# The scheduled worker (this config) does NOT use AI_QUOTA_DB — only the Pages
# Functions need it (for /api/_aiQuota.js). Binding here is intentionally
# omitted because the placeholder ID fails wrangler validation. AI_QUOTA_DB
# is bound to the Pages project separately via the Cloudflare dashboard.

# ── Environment variables (placeholders) ─────────────────────────────────────
# Set actual values in Cloudflare dashboard — never commit secrets here
# NOTE: AI_QUOTA_DB (D1) must also be bound in Cloudflare Pages → Settings → Environment Variables
#       for Pages Functions to access it alongside this scheduled worker binding.
[vars]
ENVIRONMENT = "production"

# ── Additional env vars required for /api/backfill (Pages Functions) ─────────
# Add these in Cloudflare Pages → Settings → Environment Variables:
#   FIREBASE_SERVICE_ACCOUNT_JSON  — full JSON from Firebase console →
#                                    Project Settings → Service Accounts → Generate new private key
#   (CRON_SECRET already required by /api/streak-push — reuse the same value)
#   (VITE_FIREBASE_PROJECT_ID already set for the app build — also available to Functions)

# ── Workers AI binding ────────────────────────────────────────────────────────
# Cloudflare Workers AI — used by functions/api/assess-speaking.js for Whisper
# speech-to-text. Enable Workers AI for the Pages project in the dashboard
# (Workers & Pages → the project → Settings → Functions → AI bindings) with
# the SAME binding name "AI".
[ai]
binding = "AI"
