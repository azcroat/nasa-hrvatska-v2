# wrangler.toml — Cloudflare Workers configuration for scheduled cron jobs.
# Naša Hrvatska app is deployed via Cloudflare Pages (auto-deploy on git push).
# This file configures the SEPARATE scheduled worker for push notification crons.
#
# ── Deploy instructions ───────────────────────────────────────────────────────
# 1. Create KV namespace:
#      wrangler kv:namespace create PUSH_SUBSCRIPTIONS
# 2. Copy the returned namespace ID into [[kv_namespaces]] id below
# 3. Set env vars in Cloudflare dashboard (not here):
#      CRON_SECRET         — any random secret string (used to auth cron → API calls)
#      VAPID_PRIVATE_KEY   — VAPID private key for web push signing
#      VAPID_PUBLIC_KEY    — VAPID public key (sent to browser on subscribe)
#      PAGES_URL           — https://nasahrvatska.com
# 4. Deploy once: wrangler deploy
#    (Cloudflare then runs the cron automatically — no further manual steps)

name                  = "nasa-hrvatska-scheduler"
main                  = "functions/scheduled.js"
compatibility_date    = "2024-09-23"
compatibility_flags   = ["nodejs_compat"]
workers_dev           = false
preview_urls          = false

[triggers]
crons = ["0 9 * * *"]    # 9am UTC daily — streak reminder push

# ── KV namespace binding ───────────────────────────────────────────────────────
# Replace REPLACE_WITH_ACTUAL_NAMESPACE_ID with output of:
#   wrangler kv:namespace create PUSH_SUBSCRIPTIONS
[[kv_namespaces]]
binding    = "PUSH_SUBSCRIPTIONS"
id         = "4652e2388967424db09395a2be0aad81"

# ── D1 database binding (AI quota — globally consistent) ─────────────────────
# Create with: wrangler d1 create nasa-hrvatska-quota
# Then replace REPLACE_WITH_D1_DATABASE_ID below with the returned database_id.
# Run schema: wrangler d1 execute nasa-hrvatska-quota --file=migrations/0001_quota_schema.sql
[[d1_databases]]
binding     = "AI_QUOTA_DB"
database_name = "nasa-hrvatska-quota"
database_id   = "REPLACE_WITH_D1_DATABASE_ID"

# ── Environment variables (placeholders) ─────────────────────────────────────
# Set actual values in Cloudflare dashboard — never commit secrets here
# NOTE: AI_QUOTA_DB (D1) must also be bound in Cloudflare Pages → Settings → Environment Variables
#       for Pages Functions to access it alongside this scheduled worker binding.
[vars]
ENVIRONMENT = "production"

# ── Additional env vars required for /api/backfill (Pages Functions) ─────────
# Add these in Cloudflare Pages → Settings → Environment Variables:
#   FIREBASE_SERVICE_ACCOUNT_JSON  — full JSON from Firebase console →
#                                    Project Settings → Service Accounts → Generate new private key
#   (CRON_SECRET already required by /api/streak-push — reuse the same value)
#   (VITE_FIREBASE_PROJECT_ID already set for the app build — also available to Functions)
