apply plugin: 'com.android.application'

android {
    namespace = "com.nasahrvatska.app"
    compileSdk = rootProject.ext.compileSdkVersion

    // ── Release signing ──────────────────────────────────────────────────────
    // Local builds: credentials are loaded from android/keystore.properties
    //   (gitignored — never committed). No env vars needed on the local machine.
    //
    // CI (GitHub Actions): keystore.properties is absent; falls back to env vars:
    //   KEYSTORE_PATH   — absolute path to nasa-hrvatska-release.jks
    //   KEYSTORE_PASS   — keystore password
    //   KEY_ALIAS       — key alias (default: nasa-hrvatska)
    //   KEY_PASS        — key password
    //
    // See ANDROID_BUILD.md for full instructions.
    def _kp = rootProject.file("keystore.properties")
    def _ks = new Properties()
    if (_kp.exists()) { _kp.withInputStream { _ks.load(it) } }

    def _storePath = _ks['keystorePath'] ? rootProject.file(_ks['keystorePath']).absolutePath
                                         : System.getenv("KEYSTORE_PATH")
    def _storePass = _ks['keystorePassword'] ?: System.getenv("KEYSTORE_PASS") ?: ""
    def _keyAlias  = _ks['keyAlias']         ?: System.getenv("KEY_ALIAS")      ?: "nasa-hrvatska"
    def _keyPass   = _ks['keyPassword']      ?: System.getenv("KEY_PASS")       ?: ""

    if (_storePath) {
        signingConfigs {
            release {
                storeFile file(_storePath)
                storePassword _storePass
                keyAlias _keyAlias
                keyPassword _keyPass
            }
        }
    }

    defaultConfig {
        applicationId "com.nasahrvatska.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 40
        versionName "2.4.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            // Enable R8 shrinking and obfuscation for smaller, faster release AAB
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Wire in signing config when env vars are present
            if (android.signingConfigs.hasProperty('release')) {
                signingConfig signingConfigs.release
            }
        }
        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Debug builds are signed with the default debug keystore automatically
        }
    }

    // Build release AAB (Android App Bundle) — required for Play Store submission
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
